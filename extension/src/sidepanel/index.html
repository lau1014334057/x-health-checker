<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X 账号诊断面板</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <header>
        <div class="eyebrow">账号诊断</div>
        <h1>X 账号健康检查</h1>
        <p id="subtitle">正在等待页面账号信息。</p>
      </header>
      <section class="card actions">
        <label class="field">
          <span>手动查询</span>
          <input id="manual-handle" type="text" placeholder="@username" autocomplete="off" />
        </label>
        <button id="manual-run">开始检测</button>
      </section>
      <section class="card" id="summary">
        运行一次检测后，这里会显示账号的健康评分与建议。
      </section>
      <section class="card" id="visibility">
        可见性检测结果会显示在这里。
      </section>
    </main>
    <script type="module" src="./index.js"></script>
  </body>
</html>
